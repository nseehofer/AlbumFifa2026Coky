<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Álbum FIFA 2026</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
</head>
<body>

    <!-- Header -->
    <nav class="navbar navbar-dark mb-4">
        <div class="container-fluid justify-content-center">
            <a href="#" class="navbar-brand mb-0 h1 fs-2" onclick="irAPaginaDirecta(0); return false;" title="Volver al inicio">Álbum Interactivo FIFA 2026 - Para el COKY</a>
        </div>
    </nav>

    <div class="container">
        
        <!-- Controles de Navegación -->
        <div class="controls-container d-flex flex-wrap justify-content-between align-items-center gap-3">
            <button id="btn-prev" class="btn btn-primary" onclick="cambiarPagina(-1)">&laquo; Anterior</button>
            
            <div class="d-flex align-items-center flex-grow-1 mx-md-4 position-relative" id="buscador-container">
                <label for="buscar-pagina" class="me-2 fw-bold d-none d-sm-block">Buscar:</label>
                <input type="text" id="buscar-pagina" class="form-control text-center fw-bold" placeholder="Escribí o seleccioná un país..." value="Intro" autocomplete="off">
                <ul id="lista-sugerencias" class="dropdown-menu w-100 text-center shadow sugerencias-dropdown">
                    <!-- Se llena con JavaScript -->
                </ul>
            </div>

            <button id="btn-next" class="btn btn-primary" onclick="cambiarPagina(1)">Siguiente &raquo;</button>
        </div>

        <!-- Título de la página actual -->
        <div class="page-title-container">
            <h2 id="titulo-pagina" class="fw-bold">Intro</h2>
            <p id="info-pagina" class="text-muted">Página 1 de 52 | Contiene 9 figuritas (Nº 0 al 8)</p>
        </div>

        <!-- Contenedor de las Figuritas -->
        <div id="contenedor-figuritas" class="figuritas-grid">
            <!-- Las figuritas se inyectan acá -->
        </div>

    </div>

    <!-- Bootstrap JS (opcional pero recomendado) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./script.js"></script>
    
   
</body>
</html>
